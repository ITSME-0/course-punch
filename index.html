<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课时打卡</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="打卡">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Pages ── */
    .page {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      transition: transform 0.32s cubic-bezier(.4,0,.2,1);
      background: #f5f5f7;
      padding: 24px 16px 40px;
    }

    #page-main  { transform: translateX(0); }
    #page-log   { transform: translateX(100%); }

    body.show-log #page-main { transform: translateX(-30%); }
    body.show-log #page-log  { transform: translateX(0); }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1d1d1f;
      flex: 1;
      text-align: center;
    }

    .header-side {
      width: 44px;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 15px;
      color: #007aff;
      cursor: pointer;
      padding: 4px 0;
    }

    /* ── Course buttons ── */
    .courses {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .course-btn {
      padding: 16px 28px;
      font-size: 17px;
      font-weight: 500;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: white;
      transition: transform 0.1s, opacity 0.1s;
      min-width: 120px;
    }

    .course-btn:active { transform: scale(0.96); opacity: 0.85; }

    /* ── Summary chips ── */
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .summary-chip {
      background: white;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 14px;
      color: #444;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .summary-chip:active { transform: scale(0.96); box-shadow: none; }
    .summary-chip span { font-weight: 600; }

    /* ── Bottom buttons on main page ── */
    .main-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .action-btn {
      background: none;
      border: 1.5px solid #ccc;
      border-radius: 20px;
      padding: 7px 20px;
      font-size: 14px;
      color: #666;
      cursor: pointer;
    }

    .action-btn:hover { border-color: #888; color: #333; }
    .action-btn.primary { border-color: #007aff; color: #007aff; }

    /* ── Log page records ── */
    .records { max-width: 480px; margin: 0 auto; }

    .record {
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .record-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .record-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .record-name { font-size: 16px; font-weight: 500; color: #1d1d1f; }
    .record-time { font-size: 13px; color: #888; }

    .record-delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      border-radius: 6px;
    }

    .record-delete:hover { color: #ff3b30; background: #fff0ef; }

    .empty {
      text-align: center;
      color: #aaa;
      font-size: 15px;
      padding: 60px 0;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 18px;
      padding: 24px 20px;
      width: 320px;
      max-width: 90vw;
    }

    .modal h2 { font-size: 17px; margin-bottom: 16px; color: #1d1d1f; }

    .course-list-edit { margin-bottom: 12px; }

    .course-edit-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .course-edit-row input[type="text"] {
      flex: 1;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 15px;
      outline: none;
    }

    .course-edit-row input[type="text"]:focus { border-color: #007aff; }

    .del-course-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    .del-course-btn:hover { color: #ff3b30; }

    .add-course-btn {
      background: none;
      border: 1.5px dashed #ccc;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      color: #888;
      cursor: pointer;
      width: 100%;
      margin-bottom: 16px;
    }

    .add-course-btn:hover { border-color: #007aff; color: #007aff; }

    .modal-actions { display: flex; gap: 10px; }

    .btn-cancel {
      flex: 1;
      padding: 10px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      background: none;
      font-size: 15px;
      cursor: pointer;
      color: #444;
    }

    .btn-save {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #007aff;
      font-size: 15px;
      cursor: pointer;
      color: white;
      font-weight: 500;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 200;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "692336a508914237b6daeb414b1069cf"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>

<!-- Main page -->
<div class="page" id="page-main">
  <div class="header">
    <div class="header-side"></div>
    <h1>课时打卡</h1>
    <div class="header-side"></div>
  </div>

  <div class="courses" id="courses"></div>
  <div class="summary" id="summary"></div>

  <div class="main-actions">
    <button class="action-btn primary" onclick="showLog()">查看记录</button>
    <button class="action-btn" onclick="openModal()">管理课程</button>
  </div>
</div>

<!-- Log page -->
<div class="page" id="page-log">
  <div class="header">
    <div class="header-side">
      <button class="back-btn" onclick="hideLog()">‹ 返回</button>
    </div>
    <h1 id="log-title">上课记录</h1>
    <div class="header-side"></div>
  </div>

  <div class="records" id="records"></div>
</div>

<!-- Manage modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>管理课程</h2>
    <div class="course-list-edit" id="courseListEdit"></div>
    <button class="add-course-btn" onclick="addCourseInput()">+ 添加课程</button>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const COLORS = ['#007aff','#34c759','#ff9500','#af52de','#ff2d55','#5ac8fa','#ff6b35','#30b0c7'];

  let state = load();

  function load() {
    const raw = localStorage.getItem('coursepunch');
    if (raw) return JSON.parse(raw);
    return { courses: ['钢琴', '英语', '数学'], records: [] };
  }

  function save() {
    localStorage.setItem('coursepunch', JSON.stringify(state));
  }

  function colorFor(name) {
    let hash = 0;
    for (let c of name) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffffff;
    return COLORS[Math.abs(hash) % COLORS.length];
  }

  function punch(name) {
    const now = new Date();
    state.records.unshift({ id: now.getTime(), name, time: now.toISOString() });
    save();
    renderMain();
    showToast(`已记录 ${name}`);
  }

  function deleteRecord(id) {
    state.records = state.records.filter(r => r.id !== id);
    save();
    renderMain();
    renderLog(currentFilter);
  }

  function formatTime(iso) {
    const d = new Date(iso);
    const today = new Date();
    const isToday = d.toDateString() === today.toDateString();
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    const isYesterday = d.toDateString() === yesterday.toDateString();
    const hm = d.toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
    if (isToday) return `今天 ${hm}`;
    if (isYesterday) return `昨天 ${hm}`;
    return `${d.getMonth()+1}/${d.getDate()} ${hm}`;
  }

  function renderMain() {
    const coursesEl = document.getElementById('courses');
    coursesEl.innerHTML = state.courses.map(name => `
      <button class="course-btn" style="background:${colorFor(name)}" onclick="punch('${name.replace(/'/g,"\\'")}')">
        ${name}
      </button>
    `).join('');

    const counts = {};
    state.courses.forEach(n => counts[n] = 0);
    state.records.forEach(r => { if (counts[r.name] !== undefined) counts[r.name]++; });

    document.getElementById('summary').innerHTML = state.courses.map(name => `
      <div class="summary-chip" style="border-left: 3px solid ${colorFor(name)}; padding-left: 12px;"
           onclick="showLog('${name.replace(/'/g,"\\'")}')">
        ${name} <span>${counts[name]}</span> 节
      </div>
    `).join('');
  }

  function renderLog(filter) {
    const el = document.getElementById('records');
    const list = filter ? state.records.filter(r => r.name === filter) : state.records;
    if (list.length === 0) {
      el.innerHTML = '<div class="empty">还没有记录</div>';
      return;
    }
    el.innerHTML = list.map(r => `
      <div class="record">
        <div class="record-left">
          <div class="record-dot" style="background:${colorFor(r.name)}"></div>
          <div>
            ${filter ? '' : `<div class="record-name">${r.name}</div>`}
            <div class="record-time">${formatTime(r.time)}</div>
          </div>
        </div>
        <button class="record-delete" onclick="deleteRecord(${r.id})">×</button>
      </div>
    `).join('');
  }

  let currentFilter = null;

  function showLog(filter) {
    currentFilter = filter || null;
    document.getElementById('log-title').textContent = currentFilter ? currentFilter : '上课记录';
    renderLog(currentFilter);
    document.body.classList.add('show-log');
  }

  function hideLog() {
    document.body.classList.remove('show-log');
    currentFilter = null;
  }

  // Modal
  function openModal() {
    document.getElementById('courseListEdit').innerHTML = state.courses.map((name, i) => `
      <div class="course-edit-row">
        <input type="text" value="${name}" data-idx="${i}">
        <button class="del-course-btn" onclick="this.parentElement.remove()">×</button>
      </div>
    `).join('');
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function addCourseInput() {
    const el = document.getElementById('courseListEdit');
    const row = document.createElement('div');
    row.className = 'course-edit-row';
    row.innerHTML = `
      <input type="text" placeholder="课程名称">
      <button class="del-course-btn" onclick="this.parentElement.remove()">×</button>
    `;
    el.appendChild(row);
    row.querySelector('input').focus();
  }

  function saveModal() {
    const inputs = document.querySelectorAll('#courseListEdit input[type="text"]');
    const courses = [...inputs].map(i => i.value.trim()).filter(Boolean);
    if (courses.length === 0) { showToast('至少保留一个课程'); return; }
    state.courses = courses;
    save();
    renderMain();
    closeModal();
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }

  renderMain();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
