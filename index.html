<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课时打卡</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="打卡">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: #F2F0ED;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Pages ── */
    .page {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      transition: transform 0.32s cubic-bezier(.4,0,.2,1);
      background: #F2F0ED;
      padding: 56px 20px 48px;
    }

    #page-main  { transform: translateX(0); }
    #page-log   { transform: translateX(100%); }

    body.show-log #page-main { transform: translateX(-30%); }
    body.show-log #page-log  { transform: translateX(0); }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #2C2C2C;
      flex: 1;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .header-side { width: 48px; }

    .back-btn {
      background: none;
      border: none;
      font-size: 15px;
      color: #7A8A8F;
      cursor: pointer;
      padding: 4px 0;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #9DA8AC;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── Course buttons ── */
    .courses-section { margin-bottom: 44px; }

    .courses {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .course-btn {
      padding: 22px 16px;
      font-size: 17px;
      font-weight: 500;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      color: white;
      text-align: left;
      letter-spacing: 0.01em;
      transition: transform 0.12s, opacity 0.12s;
      line-height: 1;
    }

    .course-btn:active { transform: scale(0.97); opacity: 0.9; }

    /* ── Summary ── */
    .summary-section { margin-bottom: 44px; }

    .summary {
      display: flex;
      flex-direction: column;
      gap: 2px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }

    .summary-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 16px;
      font-size: 15px;
      color: #2C2C2C;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid #F2F0ED;
      transition: background 0.1s;
    }

    .summary-chip:last-child { border-bottom: none; }
    .summary-chip:active { background: #F8F7F5; }

    .summary-chip-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .summary-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .summary-chip-right {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #9DA8AC;
      font-size: 14px;
    }

    .summary-chip-right span {
      font-size: 16px;
      font-weight: 600;
      color: #2C2C2C;
    }

    .summary-chip-arrow { font-size: 13px; color: #C8CDD0; }

    /* ── Bottom actions ── */
    .main-actions {
      display: flex;
      gap: 10px;
    }

    .action-btn {
      flex: 1;
      background: white;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 14px;
      color: #5A6A70;
      cursor: pointer;
      transition: background 0.1s;
    }

    .action-btn:active { background: #EDECEA; }
    .action-btn.primary { color: #4E7A8A; font-weight: 500; }

    /* ── Log page records ── */
    .records { max-width: 480px; margin: 0 auto; }

    .record {
      background: white;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .record-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .record-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .record-name { font-size: 15px; font-weight: 500; color: #2C2C2C; }
    .record-time { font-size: 13px; color: #9DA8AC; margin-top: 2px; }

    .record-delete {
      background: none;
      border: none;
      color: #C8CDD0;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      border-radius: 6px;
    }

    .record-delete:active { color: #A07070; }

    .empty {
      text-align: center;
      color: #B0B8BB;
      font-size: 15px;
      padding: 80px 0;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #F8F7F5;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 540px;
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: #D0CECA;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #2C2C2C; }

    .course-list-edit { margin-bottom: 12px; }

    .course-edit-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .course-edit-row input[type="text"] {
      flex: 1;
      border: none;
      background: white;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 15px;
      outline: none;
      color: #2C2C2C;
    }

    .del-course-btn {
      background: none;
      border: none;
      color: #C8CDD0;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      width: 32px;
    }

    .add-course-btn {
      background: none;
      border: 1.5px dashed #C8CDD0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      color: #9DA8AC;
      cursor: pointer;
      width: 100%;
      margin-bottom: 20px;
    }

    .modal-actions { display: flex; gap: 10px; }

    .btn-cancel {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: white;
      font-size: 15px;
      cursor: pointer;
      color: #5A6A70;
    }

    .btn-save {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: #4E7A8A;
      font-size: 15px;
      cursor: pointer;
      color: white;
      font-weight: 500;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(44,44,44,0.82);
      color: white;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 200;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "692336a508914237b6daeb414b1069cf"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>

<!-- Main page -->
<div class="page" id="page-main">
  <div class="header">
    <div class="header-side"></div>
    <h1>课时打卡</h1>
    <div class="header-side"></div>
  </div>

  <div class="courses-section">
    <div class="section-label">打卡</div>
    <div class="courses" id="courses"></div>
  </div>

  <div class="summary-section">
    <div class="section-label">汇总</div>
    <div class="summary" id="summary"></div>
  </div>

  <div class="main-actions">
    <button class="action-btn primary" onclick="showLog()">全部记录</button>
    <button class="action-btn" onclick="openModal()">管理课程</button>
  </div>
</div>

<!-- Log page -->
<div class="page" id="page-log">
  <div class="header">
    <div class="header-side">
      <button class="back-btn" onclick="hideLog()">‹ 返回</button>
    </div>
    <h1 id="log-title">上课记录</h1>
    <div class="header-side"></div>
  </div>
  <div class="records" id="records"></div>
</div>

<!-- Manage modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>管理课程</h2>
    <div class="course-list-edit" id="courseListEdit"></div>
    <button class="add-course-btn" onclick="addCourseInput()">+ 添加课程</button>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const COLORS = ['#7A9BAE','#8AAE96','#AE9B7A','#9A8AAE','#AE7A8A','#7AAEAA','#AE8A7A','#8A9AAE'];

  let state = load();

  function load() {
    const raw = localStorage.getItem('coursepunch');
    if (raw) return JSON.parse(raw);
    return { courses: ['钢琴', '英语', '数学'], records: [] };
  }

  function save() {
    localStorage.setItem('coursepunch', JSON.stringify(state));
  }

  function colorFor(name) {
    let hash = 0;
    for (let c of name) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffffff;
    return COLORS[Math.abs(hash) % COLORS.length];
  }

  function punch(name) {
    const now = new Date();
    state.records.unshift({ id: now.getTime(), name, time: now.toISOString() });
    save();
    renderMain();
    showToast(`已记录 ${name}`);
  }

  function deleteRecord(id) {
    state.records = state.records.filter(r => r.id !== id);
    save();
    renderMain();
    renderLog(currentFilter);
  }

  function formatTime(iso) {
    const d = new Date(iso);
    const today = new Date();
    const isToday = d.toDateString() === today.toDateString();
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    const isYesterday = d.toDateString() === yesterday.toDateString();
    const hm = d.toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
    if (isToday) return `今天 ${hm}`;
    if (isYesterday) return `昨天 ${hm}`;
    return `${d.getMonth()+1}/${d.getDate()} ${hm}`;
  }

  function renderMain() {
    document.getElementById('courses').innerHTML = state.courses.map(name => `
      <button class="course-btn" style="background:${colorFor(name)}" onclick="punch('${name.replace(/'/g,"\\'")}')">
        ${name}
      </button>
    `).join('');

    const counts = {};
    state.courses.forEach(n => counts[n] = 0);
    state.records.forEach(r => { if (counts[r.name] !== undefined) counts[r.name]++; });

    document.getElementById('summary').innerHTML = state.courses.map(name => `
      <div class="summary-chip" onclick="showLog('${name.replace(/'/g,"\\'")}')">
        <div class="summary-chip-left">
          <div class="summary-dot" style="background:${colorFor(name)}"></div>
          <span>${name}</span>
        </div>
        <div class="summary-chip-right">
          <span>${counts[name]}</span> 节
          <span class="summary-chip-arrow">›</span>
        </div>
      </div>
    `).join('');
  }

  function renderLog(filter) {
    const el = document.getElementById('records');
    const list = filter ? state.records.filter(r => r.name === filter) : state.records;
    if (list.length === 0) {
      el.innerHTML = '<div class="empty">还没有记录</div>';
      return;
    }
    el.innerHTML = list.map(r => `
      <div class="record">
        <div class="record-left">
          <div class="record-dot" style="background:${colorFor(r.name)}"></div>
          <div>
            ${filter ? '' : `<div class="record-name">${r.name}</div>`}
            <div class="record-time">${formatTime(r.time)}</div>
          </div>
        </div>
        <button class="record-delete" onclick="deleteRecord(${r.id})">×</button>
      </div>
    `).join('');
  }

  let currentFilter = null;

  function showLog(filter) {
    currentFilter = filter || null;
    document.getElementById('log-title').textContent = currentFilter || '全部记录';
    renderLog(currentFilter);
    document.body.classList.add('show-log');
  }

  function hideLog() {
    document.body.classList.remove('show-log');
    currentFilter = null;
  }

  function openModal() {
    document.getElementById('courseListEdit').innerHTML = state.courses.map((name, i) => `
      <div class="course-edit-row">
        <input type="text" value="${name}" data-idx="${i}">
        <button class="del-course-btn" onclick="this.parentElement.remove()">×</button>
      </div>
    `).join('');
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function addCourseInput() {
    const el = document.getElementById('courseListEdit');
    const row = document.createElement('div');
    row.className = 'course-edit-row';
    row.innerHTML = `
      <input type="text" placeholder="课程名称">
      <button class="del-course-btn" onclick="this.parentElement.remove()">×</button>
    `;
    el.appendChild(row);
    row.querySelector('input').focus();
  }

  function saveModal() {
    const inputs = document.querySelectorAll('#courseListEdit input[type="text"]');
    const courses = [...inputs].map(i => i.value.trim()).filter(Boolean);
    if (courses.length === 0) { showToast('至少保留一个课程'); return; }
    state.courses = courses;
    save();
    renderMain();
    closeModal();
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }

  renderMain();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
